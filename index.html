<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Compressore VR — Demo Didattica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- A-Frame: il framework principale per WebXR (un solo file, dal CDN) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- Componente "environment": crea un ambiente 3D (cielo, terreno) con una sola riga -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }
    /* Pannello istruzioni iniziale, visibile solo fuori dalla VR */
    #intro {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(10,14,26,0.92); color: #fff;
      padding: 14px 18px; border-left: 4px solid #C8102E;
      max-width: 320px; font-size: 14px; line-height: 1.45;
    }
    #intro b { color: #C8102E; }
  </style>
</head>
<body>

<div id="intro">
  <b>Compressore 3 Stadi — Demo VR</b><br>
  Su PC: muovi il mouse per guardarti intorno, clicca i punti gialli.<br>
  Su Quest: apri questo file dal browser del visore e premi "Enter VR" in basso a destra.<br>
  Punta il controller sui punti gialli per leggere le info.
</div>

<a-scene>

  <!-- AMBIENTE: cielo, terreno, atmosfera. Cambia "preset" per altri stili (forest, japan, threetowers, ecc.) -->
  <a-entity environment="
    preset: default;
    groundColor: #2a2a2a;
    groundColor2: #1a1a1a;
    skyType: gradient;
    skyColor: #0a0e1a;
    horizonColor: #C8102E;
    lighting: distant;
    fog: 0.4;
    dressing: cubes;
    dressingAmount: 20;
    dressingColor: #1a1a1a"></a-entity>

  <!-- TITOLI sospesi nello spazio -->
  <a-text value="COMPRESSORE 3 STADI" position="0 3.6 -4" align="center" color="#C8102E" width="8"></a-text>
  <a-text value="Aria respirabile alta pressione - 300 bar" position="0 3.1 -4" align="center" color="#ffffff" width="5"></a-text>
  <a-text value="Guarda i punti gialli per scoprire come funziona" position="0 2.7 -4" align="center" color="#888888" width="4"></a-text>

  <!-- ====== MODELLO COMPRESSORE (costruito con primitive 3D) ====== -->

  <!-- Telaio / base -->
  <a-box position="0 0.1 -4" depth="2" width="4" height="0.2" color="#1a1a1a"></a-box>

  <!-- Motore elettrico (cilindro orizzontale) -->
  <a-cylinder position="-1.5 0.6 -4" radius="0.3" height="0.8" color="#0a0a0a" rotation="0 0 90"></a-cylinder>

  <!-- 3 stadi di compressione (cilindri verticali, sempre piu' piccoli) -->
  <a-cylinder position="-0.4 0.7 -4" radius="0.18" height="0.7" color="#C8102E"></a-cylinder>
  <a-cylinder position="0.2 0.65 -4" radius="0.14" height="0.6" color="#C8102E"></a-cylinder>
  <a-cylinder position="0.7 0.6 -4" radius="0.10" height="0.5" color="#C8102E"></a-cylinder>

  <!-- Tubazioni di collegamento -->
  <a-cylinder position="-1.0 0.6 -4" radius="0.04" height="0.3" rotation="0 0 90" color="#888"></a-cylinder>
  <a-cylinder position="-0.1 0.6 -4" radius="0.04" height="0.3" rotation="0 0 90" color="#888"></a-cylinder>
  <a-cylinder position="0.45 0.6 -4" radius="0.04" height="0.25" rotation="0 0 90" color="#888"></a-cylinder>
  <a-cylinder position="1.15 0.6 -4" radius="0.04" height="0.5" rotation="0 0 90" color="#888"></a-cylinder>

  <!-- Serbatoio finale -->
  <a-cylinder position="1.7 0.6 -4" radius="0.3" height="1.4" color="#3a3a3a" rotation="0 0 90"></a-cylinder>

  <!-- Manometro -->
  <a-circle position="1.7 1.05 -3.69" radius="0.12" color="#ffffff"></a-circle>
  <a-text value="300 bar" position="1.7 1.05 -3.68" align="center" color="#000000" width="1.5"></a-text>

  <!-- ====== HOTSPOT (sfere gialle cliccabili che pulsano) ====== -->

  <a-sphere class="hotspot"
            data-titolo="STADIO 1 - Aspirazione"
            data-info="Aspirazione aria atmosferica a 1 bar e prima compressione fino a 4-7 bar. La temperatura sale oltre 180 gradi."
            position="-0.4 1.3 -4" radius="0.08" color="#FFD700"
            animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 800"></a-sphere>

  <a-sphere class="hotspot"
            data-titolo="STADIO 2 - Media pressione"
            data-info="L'aria pre-raffreddata viene compressa a circa 40-50 bar. Tra gli stadi gli intercooler riducono la temperatura."
            position="0.2 1.2 -4" radius="0.08" color="#FFD700"
            animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 800"></a-sphere>

  <a-sphere class="hotspot"
            data-titolo="STADIO 3 - Alta pressione"
            data-info="Compressione finale fino a 300-330 bar. L'aria passa attraverso il filtro a setacci molecolari prima dello stoccaggio."
            position="0.7 1.1 -4" radius="0.08" color="#FFD700"
            animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 800"></a-sphere>

  <a-sphere class="hotspot"
            data-titolo="SERBATOIO"
            data-info="Contiene aria respirabile certificata EN 12021. Pressione massima 300 bar. Da qui si caricano le bombole subacquee."
            position="1.7 1.2 -4" radius="0.08" color="#FFD700"
            animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 800"></a-sphere>

  <!-- ====== PANNELLO INFORMATIVO che cambia testo al click ====== -->
  <a-entity id="info-panel" position="0 2.1 -2.5">
    <a-plane width="2.6" height="0.85" color="#0a0e1a" opacity="0.92"></a-plane>
    <a-plane width="2.55" height="0.04" color="#C8102E" position="0 0.3 0.001"></a-plane>
    <a-text id="info-titolo" value="Tocca un punto giallo" position="0 0.22 0.01" align="center" width="2.2" color="#C8102E"></a-text>
    <a-text id="info-text"
            value="Usa il cursore (mouse) o i controller del visore per esplorare il compressore."
            position="0 -0.08 0.01" align="center" width="2.2" color="#ffffff" wrap-count="40"></a-text>
  </a-entity>

  <!-- ====== CAMERA + CONTROLLI ====== -->
  <a-entity id="rig" position="0 0 0">
    <!-- Camera in piedi a 1.6m da terra, con un cursore rosso al centro per interagire da PC -->
    <a-camera position="0 1.6 0">
      <a-cursor color="#C8102E" raycaster="objects: .hotspot"></a-cursor>
    </a-camera>
    <!-- Controller del Meta Quest (laser pointer) -->
    <a-entity laser-controls="hand: left" raycaster="objects: .hotspot; lineColor: #C8102E"></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .hotspot; lineColor: #C8102E"></a-entity>
  </a-entity>

  <!-- LOGICA: quando clicchi un hotspot, aggiorna il testo del pannello -->
  <script>
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const titolo = document.querySelector('#info-titolo');
      const testo = document.querySelector('#info-text');
      document.querySelectorAll('.hotspot').forEach(h => {
        h.addEventListener('click', (e) => {
          titolo.setAttribute('value', e.target.dataset.titolo);
          testo.setAttribute('value', e.target.dataset.info);
        });
      });
    });
  </script>

</a-scene>

</body>
</html>
