<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📸 Photo Galaxy — Il Nostro Viaggio</title>

  <!-- A-Frame core WebXR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- aframe-extras: movement-controls + teleport -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020208; font-family: 'Georgia', 'Times New Roman', serif; }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; z-index: 999;
      background: radial-gradient(ellipse at 50% 40%, #0d0d2b 0%, #020208 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; text-align: center;
      transition: opacity 0.8s ease;
    }
    #overlay.hide { opacity: 0; pointer-events: none; }

    .star-bg {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .star-bg span {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

    .logo {
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #c8a8ff, #88c8ff, #ffb8e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3em;
      animation: glow 4s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 8px rgba(180,140,255,0.4)); }
      to   { filter: drop-shadow(0 0 24px rgba(180,140,255,0.9)); }
    }
    .subtitle { color: #aaaacc; font-size: 1.1rem; letter-spacing: 0.15em; margin-bottom: 3em; }

    #enter-btn {
      padding: 14px 48px; background: transparent;
      border: 1px solid rgba(200,168,255,0.6); border-radius: 60px;
      color: #c8a8ff; font-family: Georgia, serif; font-size: 1.1rem;
      letter-spacing: 0.15em; cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(180,140,255,0.2), inset 0 0 20px rgba(180,140,255,0.05);
    }
    #enter-btn:hover {
      background: rgba(200,168,255,0.12);
      box-shadow: 0 0 40px rgba(180,140,255,0.5), inset 0 0 30px rgba(180,140,255,0.1);
      transform: scale(1.03);
    }

    .hint {
      margin-top: 2.5em; color: #55557a;
      font-size: 0.78rem; letter-spacing: 0.1em; line-height: 1.8;
    }
    .hint strong { color: #8888aa; }

    /* Loading bar */
    #loadbar {
      width: 200px; height: 2px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin: 2em auto 0;
      overflow: hidden; display: none;
    }
    #loadbar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #c8a8ff, #88c8ff);
      transition: width 0.3s ease;
    }
    #load-text { margin-top: 0.8em; font-size: 0.75rem; color: #6666aa; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<!-- ── ENTRY OVERLAY ── -->
<div id="overlay">
  <div class="star-bg" id="css-stars"></div>

  <div class="logo">✦ Photo Galaxy ✦</div>
  <div class="subtitle">il nostro viaggio insieme</div>

  <button id="enter-btn" onclick="enterGallery()">Entra nella galassia</button>

  <div id="loadbar"><div id="loadbar-fill"></div></div>
  <div id="load-text"></div>

  <div class="hint">
    <strong>Meta Quest:</strong> apri nel browser → premi il tasto VR<br>
    <strong>Movimento:</strong> levetta sinistra = cammina · levetta destra = ruota<br>
    <strong>Teleport:</strong> premi e tieni il trigger sinistro → punta → rilascia
  </div>
</div>

<!-- ── A-FRAME SCENE ── -->
<a-scene
  id="scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: bounded-floor, hand-tracking, layers"
  renderer="colorManagement: true; antialias: true; sortObjects: true; physicallyCorrectLights: false"
  loading-screen="enabled: false"
  vr-mode-ui="enabled: true"
  background="color: #020208">

  <!-- ASSETS -->
  <a-assets id="assets" timeout="60000">
    <img id="img01" src="photos/IMG_8307.JPG"  crossorigin="anonymous">
    <img id="img02" src="photos/IMG_6894.JPG"  crossorigin="anonymous">
    <img id="img03" src="photos/IMG_6661.JPG"  crossorigin="anonymous">
    <img id="img04" src="photos/IMG_6110.JPG"  crossorigin="anonymous">
    <img id="img05" src="photos/IMG_8539.JPG"  crossorigin="anonymous">
    <img id="img06" src="photos/IMG_4952.JPG"  crossorigin="anonymous">
    <img id="img07" src="photos/IMG_7094.jpg"  crossorigin="anonymous">
    <img id="img08" src="photos/IMG_7280.JPG"  crossorigin="anonymous">
    <img id="img09" src="photos/IMG_7134.JPG"  crossorigin="anonymous">
    <img id="img10" src="photos/IMG_4581.JPG"  crossorigin="anonymous">
    <img id="img11" src="photos/IMG_7088.JPG"  crossorigin="anonymous">
    <img id="img12" src="photos/IMG_5313.JPG"  crossorigin="anonymous">
    <img id="img13" src="photos/IMG_7850.JPG"  crossorigin="anonymous">
    <img id="img14" src="photos/IMG_5004.JPG"  crossorigin="anonymous">
    <img id="img15" src="photos/IMG_0625.JPG"  crossorigin="anonymous">
    <img id="img16" src="photos/IMG_8533.JPG"  crossorigin="anonymous">
    <img id="img17" src="photos/IMG_8478.JPG"  crossorigin="anonymous">
    <img id="img18" src="photos/IMG_7165.JPG"  crossorigin="anonymous">
    <!-- Video (converti in .mp4 per compatibilità) -->
    <video id="vid01" src="photos/IMG_4946.MOV"
           crossorigin="anonymous" loop playsinline webkit-playsinline
           preload="metadata" muted></video>
  </a-assets>

  <!-- ── SKY ── deep void -->
  <a-sky color="#010106"></a-sky>

  <!-- ── ENVIRONMENT NEBULA: large translucent spheres for atmosphere ── -->
  <a-sphere position=" 40  20 -60" radius="35" segments-height="6" segments-width="6"
            material="color:#1a0a3a; opacity:0.08; transparent:true; shader:flat; side:back"></a-sphere>
  <a-sphere position="-50  10 -40" radius="28" segments-height="6" segments-width="6"
            material="color:#0a1a3a; opacity:0.07; transparent:true; shader:flat; side:back"></a-sphere>
  <a-sphere position="  0 -30 -50" radius="40" segments-height="6" segments-width="6"
            material="color:#0a2a1a; opacity:0.05; transparent:true; shader:flat; side:back"></a-sphere>

  <!-- ── GRID FLOOR (subtle) ── -->
  <a-plane id="floor"
           position="0 0 0" rotation="-90 0 0"
           width="200" height="200"
           material="color:#0d0d22; opacity:0.9; transparent:true; shader:flat"
           class="teleport-floor">
  </a-plane>
  <!-- Grid lines overlay -->
  <a-plane position="0 0.01 0" rotation="-90 0 0" width="200" height="200"
           material="src: #grid-tex; repeat: 40 40; opacity:0.12; transparent:true; shader:flat">
  </a-plane>

  <!-- ── AMBIENT LIGHT ── -->
  <a-light type="ambient"     color="#334466" intensity="1.2"></a-light>
  <a-light type="directional" color="#6688cc" intensity="0.4" position="1 3 2"></a-light>
  <a-light type="point" color="#8866ff" intensity="0.8" position="0 8 0" distance="30"></a-light>

  <!-- ── STARS (generated by script) ── -->
  <a-entity id="starfield"></a-entity>

  <!-- ── PHOTO GALLERY (generated by script) ── -->
  <a-entity id="gallery"></a-entity>

  <!-- ── VIDEO PANEL (featured, elevated) ── -->
  <a-entity id="video-panel" position="0 3.5 -5">
    <!-- outer glow -->
    <a-plane width="3.8" height="2.8" position="0 0 -0.05"
             material="color:#ff7744; opacity:0.15; transparent:true; shader:flat"></a-plane>
    <!-- frame -->
    <a-plane width="3.4" height="2.4" position="0 0 -0.01"
             material="color:#1a0800; shader:flat"></a-plane>
    <!-- video surface -->
    <a-video src="#vid01" width="3.2" height="2.0" position="0 0 0"
             material="shader:flat"></a-video>
    <!-- label -->
    <a-text value="▶  VIDEO" position="0 -1.4 0" align="center"
            color="#ff9955" width="5" font="roboto"></a-text>
    <!-- play hint (fades when playing) -->
    <a-text id="play-hint" value="[ guarda a lungo per avviare ]"
            position="0 0 0.01" align="center"
            color="rgba(255,255,255,0.6)" width="3.5" font="roboto"></a-text>
  </a-entity>

  <!-- ── TITLE IN SPACE ── -->
  <a-text value="✦  Photo Galaxy  ✦"
          position="0 5.5 -8" align="center"
          color="#c8a8ff" width="12"
          font="roboto"
          material="shader:flat"></a-text>
  <a-text value="il nostro viaggio insieme"
          position="0 4.8 -8" align="center"
          color="#6666aa" width="7"
          font="roboto"></a-text>

  <!-- ── CAMERA RIG ── -->
  <a-entity id="rig" position="0 0 3"
            movement-controls="fly: false; speed: 5; camera: #cam; constrainToNavMesh: false">

    <a-entity id="cam"
              camera="active: true; fov: 80"
              position="0 1.6 0"
              look-controls="pointerLockEnabled: false; reverseMouseDrag: false">
      <!-- Gaze cursor -->
      <a-cursor id="cursor"
                color="#ffffff" opacity="0.6"
                scale="0.6 0.6 0.6"
                animation__fusing="property: scale; startEvents: fusing; from: 0.6 0.6 0.6; to: 0.3 0.3 0.3; dur: 1500"
                animation__click="property: scale; startEvents: click; from: 0.3 0.3 0.3; to: 0.6 0.6 0.6; dur: 150"
                raycaster="objects: #vid01, .photo-panel, .teleport-floor; far: 60">
      </a-cursor>
    </a-entity>

    <!-- LEFT controller: teleportation -->
    <a-entity id="left-ctrl"
              laser-controls="hand: left"
              raycaster="objects: .teleport-floor; far: 40; showLine: true"
              line="color: #88ccff; opacity: 0.5"
              teleport-controls="
                cameraRig: #rig;
                teleportOrigin: #cam;
                button: trigger;
                type: parabolic;
                curveColor: #88ccff;
                curveLineWidth: 0.015;
                curveNumberPoints: 40;
                collisionEntities: .teleport-floor;
                landingNormal: 0 1 0;
                landingMaxAngle: 45">
    </a-entity>

    <!-- RIGHT controller: pointer + snap-turn (movement-controls handles it) -->
    <a-entity id="right-ctrl"
              laser-controls="hand: right"
              raycaster="objects: .photo-panel; far: 40; showLine: false">
    </a-entity>
  </a-entity>

</a-scene>

<!-- ────────────────────────────────────────────── -->
<!--  JAVASCRIPT                                    -->
<!-- ────────────────────────────────────────────── -->
<script>
/* ── CSS stars in overlay ── */
(function() {
  const bg = document.getElementById('css-stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('span');
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      animation-delay:${Math.random()*4}s;
      animation-duration:${2+Math.random()*3}s;
      opacity:${Math.random()*0.6+0.1};
    `;
    bg.appendChild(s);
  }
})();

/* ── Build procedural starfield in scene ── */
function buildStarfield() {
  const container = document.getElementById('starfield');
  const count = 600;
  const R = 90;
  const frag = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    // Random point on sphere
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = R * (0.8 + Math.random() * 0.2);
    const x = (r * Math.sin(phi) * Math.cos(theta)).toFixed(2);
    const y = (r * Math.sin(phi) * Math.sin(theta)).toFixed(2);
    const z = (r * Math.cos(phi)).toFixed(2);

    const size  = (Math.random() * 0.08 + 0.02).toFixed(3);
    const alpha = (Math.random() * 0.7 + 0.2).toFixed(2);

    // Colour: white/blue/slightly warm
    const hue  = Math.random() < 0.8 ? 220 : 40;
    const col  = `hsl(${hue}, 40%, 90%)`;

    const star = document.createElement('a-sphere');
    star.setAttribute('position', `${x} ${y} ${z}`);
    star.setAttribute('radius',   size);
    star.setAttribute('segments-height', '4');
    star.setAttribute('segments-width',  '4');
    star.setAttribute('material', `color:${col}; shader:flat; opacity:${alpha}; transparent:true`);
    frag.appendChild(star);
  }
  container.appendChild(frag);
}

/* ── Build photo gallery ── */
function buildGallery() {
  const gallery = document.getElementById('gallery');

  // 18 photos
  const photos = [
    '#img01','#img02','#img03','#img04','#img05','#img06',
    '#img07','#img08','#img09','#img10','#img11','#img12',
    '#img13','#img14','#img15','#img16','#img17','#img18'
  ];

  /*  3 concentric rings – all photos face the origin (inward).
      Each ring has a different accent colour for its glow halo.
      Heights alternate slightly for visual richness.            */
  const rings = [
    { count: 6,  radius: 5.5,  baseY: 1.6, angleOffset:  0, glow: '#8866ff', frame: '#100818', scale: 1.0 },
    { count: 6,  radius: 10.5, baseY: 1.6, angleOffset: 30, glow: '#22aaff', frame: '#040e18', scale: 1.1 },
    { count: 6,  radius: 16,   baseY: 1.6, angleOffset: 60, glow: '#ff5599', frame: '#180408', scale: 1.2 },
  ];

  const PW = 1.9; // panel width  (portrait)
  const PH = 2.5; // panel height (portrait 4:3 → approx)

  let idx = 0;
  const frag = document.createDocumentFragment();

  rings.forEach(ring => {
    for (let i = 0; i < ring.count && idx < photos.length; i++, idx++) {
      const angleDeg = (i / ring.count) * 360 + ring.angleOffset;
      const angleRad = angleDeg * Math.PI / 180;

      const x = Math.sin(angleRad) * ring.radius;
      const z = Math.cos(angleRad) * ring.radius;

      // Slight height variation
      const yOff = (i % 3 === 0) ? 0.4 : (i % 3 === 1) ? -0.3 : 0.1;
      const y    = ring.baseY + yOff;

      // Rotation to face origin
      const rotY = (angleDeg + 180) % 360;

      const w = (PW * ring.scale).toFixed(2);
      const h = (PH * ring.scale).toFixed(2);

      /* wrapper */
      const wrap = document.createElement('a-entity');
      wrap.setAttribute('position', `${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`);
      wrap.setAttribute('rotation', `0 ${rotY.toFixed(1)} 0`);

      /* glow halo (backmost) */
      const glow = document.createElement('a-plane');
      const gw = (parseFloat(w) + 0.5).toFixed(2);
      const gh = (parseFloat(h) + 0.5).toFixed(2);
      glow.setAttribute('width',  gw);
      glow.setAttribute('height', gh);
      glow.setAttribute('position', '0 0 -0.06');
      glow.setAttribute('material',
        `color:${ring.glow}; opacity:0.18; transparent:true; shader:flat`);
      wrap.appendChild(glow);

      /* frame */
      const frame = document.createElement('a-plane');
      frame.setAttribute('width',  (parseFloat(w) + 0.12).toFixed(2));
      frame.setAttribute('height', (parseFloat(h) + 0.12).toFixed(2));
      frame.setAttribute('position', '0 0 -0.012');
      frame.setAttribute('material', `color:${ring.frame}; shader:flat`);
      wrap.appendChild(frame);

      /* photo */
      const photo = document.createElement('a-plane');
      photo.setAttribute('width',  w);
      photo.setAttribute('height', h);
      photo.setAttribute('src',    photos[idx]);
      photo.setAttribute('material', `src:${photos[idx]}; shader:flat; side:front`);
      photo.setAttribute('class', 'photo-panel');
      wrap.appendChild(photo);

      /* back side (dark, so frame looks solid from behind) */
      const back = document.createElement('a-plane');
      back.setAttribute('width',  w);
      back.setAttribute('height', h);
      back.setAttribute('position', '0 0 -0.005');
      back.setAttribute('rotation', '0 180 0');
      back.setAttribute('material', `color:#0a0814; shader:flat`);
      wrap.appendChild(back);

      frag.appendChild(wrap);
    }
  });

  gallery.appendChild(frag);
}

/* ── Video interaction (gaze to play) ── */
function setupVideo() {
  const cursor  = document.getElementById('cursor');
  const vidEl   = document.getElementById('vid01');
  const hint    = document.getElementById('play-hint');
  const vpanel  = document.getElementById('video-panel');

  if (!vpanel || !vidEl) return;

  // Click or gaze-click on video panel → toggle play
  vpanel.addEventListener('click', () => {
    if (vidEl.paused) {
      vidEl.play().then(() => {
        if (hint) hint.setAttribute('visible', false);
      }).catch(() => {});
    } else {
      vidEl.pause();
      if (hint) hint.setAttribute('visible', true);
    }
  });
}

/* ── Entry button ── */
window.enterGallery = function() {
  const overlay  = document.getElementById('overlay');
  const loadbar  = document.getElementById('loadbar');
  const loadtext = document.getElementById('load-text');
  const btn      = document.getElementById('enter-btn');

  btn.disabled = true;
  btn.textContent = 'Caricamento…';
  loadbar.style.display = 'block';
  loadtext.textContent  = 'Costruzione della galassia…';

  // Fake progress + real scene init
  let pct = 0;
  const fill = document.getElementById('loadbar-fill');
  const interval = setInterval(() => {
    pct = Math.min(pct + Math.random() * 15, 90);
    fill.style.width = pct + '%';
  }, 200);

  // Give A-Frame a moment to settle, then build scene
  setTimeout(() => {
    buildStarfield();
    buildGallery();
    setupVideo();
    clearInterval(interval);
    fill.style.width = '100%';
    loadtext.textContent = 'Benvenuto/a ✦';

    setTimeout(() => {
      overlay.classList.add('hide');
      setTimeout(() => overlay.style.display = 'none', 900);
    }, 600);
  }, 800);
};

/* ── Scene ready ── */
document.querySelector('a-scene').addEventListener('loaded', () => {
  console.log('[PhotoGalaxy] Scene loaded ✓');
});
</script>
</body>
</html>
